name: ✨ 功能请求
description: 提议一个新功能或改进
title: "[Feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你希望 xbot 新增或改进的功能。

        > 💡 提交前请先 [搜索已有 issues](https://github.com/ai-pivot/xbot/issues?q=is%3Aissue+label%3Aenhancement) 确认未被重复提议。

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      description: 这个功能主要涉及哪个模块？（可多选）
      multiple: true
      options:
        - 🖥️ CLI / TUI（终端界面）
        - 📱 Feishu（飞书）
        - 💬 QQ / NapCat
        - 🌐 Web
        - 🤖 LLM / 订阅系统（Subscription）
        - 🧠 Memory（记忆系统）
        - 🔌 Plugin（插件系统）
        - 🏗️ Runner / Sandbox（沙箱）
        - 🔄 SubAgent / Group Chat
        - 🔧 Tool（内置工具）
        - ⏱️ Cron（定时任务）
        - 🪝 Hooks（钩子）
        - 📚 Documentation（文档）
        - ❓ 其他 / 全局
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 你的功能请求是为了解决什么问题？请描述当前遇到的痛点或不便。
      placeholder: 我在使用 xbot 时，每次...都很麻烦，因为...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望 xbot 怎么做？请尽可能具体地描述。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你是否考虑过其他实现方式或 workaround？为什么觉得它们不够好？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 参考链接、截图、或任何其他有助于理解这个功能的信息。
    validations:
      required: false
