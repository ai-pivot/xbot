# baseURL is overridden by CI via --baseURL flag
# GitHub: steps.pages.outputs.base_url
# GitLab: $CI_PAGES_URL
baseURL = ""
theme = "hugo-geekdoc"

pluralizeListTitles = false
pygmentsUseClasses = true
pygmentsCodeFences = true

# ── Multilingual: English (default at root), Chinese (at /zh-cn/) ──
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableGitInfo = true

[params]
  geekdocToC = 3
  geekdocRepo = "https://github.com/ai-pivot/xbot"
  geekdocEditPath = "edit/master/docs-site"
  geekdocOverwriteHTMLBase = false
  # Show language switcher button (globe icon in header)
  geekdocDarkModeToggle = true
  geekdocDarkModeDimension = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS"]

# ──────────────────────────────────────────────
# English (default language, served at site root)
# ──────────────────────────────────────────────
[languages.en]
  languageCode = "en"
  languageName = "English"
